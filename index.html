<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Clinic — Proposta ImplementIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Jost',sans-serif;background:#faf8f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .container{text-align:center;padding:48px 32px}
  .label{font-size:10px;letter-spacing:0.28em;color:#b8956a;text-transform:uppercase;font-weight:300;margin-bottom:12px}
  h1{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;font-style:italic;color:#2c2825;margin-bottom:8px}
  .sub{font-size:12px;color:#9a8f87;font-weight:300;letter-spacing:0.1em;margin-bottom:48px}
  .cards{display:flex;gap:24px;justify-content:center;flex-wrap:wrap}
  .card{width:260px;border:0.5px solid #ddd6cc;padding:32px 24px;text-decoration:none;transition:all 0.25s;background:#fff}
  .card:hover{border-color:#2c2825;transform:translateY(-4px)}
  .card-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;font-style:italic;margin-bottom:8px}
  .card-dark .card-title{color:#1e1612}
  .card-light .card-title{color:#2c2825}
  .card-desc{font-size:11px;color:#9a8f87;font-weight:300;letter-spacing:0.06em;line-height:1.7;margin-bottom:20px}
  .card-btn{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#b8956a;font-weight:300}
  .preview-dark{height:80px;background:linear-gradient(135deg,#1e1612,#3a2e28);margin-bottom:20px}
  .preview-light{height:80px;background:linear-gradient(135deg,#f7f3ef,#ede8e2);margin-bottom:20px}
  .footer{margin-top:48px;font-size:11px;color:#b8a898;font-weight:300}
</style>
</head>
<body>
<div class="container">
  <div class="label">ImplementIQ Systems</div>
  <h1>Wedding Clinic</h1>
  <div class="sub">Proposta de website · Escolha uma versão</div>
  <div class="cards">
    <a href="index-dark.html" class="card card-dark">
      <div class="preview-dark"></div>
      <div class="card-title">Versão Dark</div>
      <div class="card-desc">Fundo escuro, tons dourados.<br>Posicionamento luxo e premium.</div>
      <div class="card-btn">Ver proposta →</div>
    </a>
    <a href="index-light.html" class="card card-light">
      <div class="preview-light"></div>
      <div class="card-title">Versão Light</div>
      <div class="card-desc">Fundo claro, tons neutros.<br>Estética moderna e elegante.</div>
      <div class="card-btn">Ver proposta →</div>
    </a>
  </div>
  <div class="footer">weddingclinic.pt · Proposta ImplementIQ Systems</div>
</div>
</body>
</html>
