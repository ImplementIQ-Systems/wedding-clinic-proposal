<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Clinic — Área Reservada</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Jost',sans-serif;background:#faf8f5;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
  .wrapper{width:100%;max-width:380px;padding:48px 32px;text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .logo{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;letter-spacing:0.15em;color:#2c2825;font-style:italic;margin-bottom:6px}
  .subtitle{font-size:10px;letter-spacing:0.28em;color:#b8956a;text-transform:uppercase;font-weight:300;margin-bottom:48px}
  .divider{width:32px;height:0.5px;background:#ddd6cc;margin:0 auto 48px}
  .form{width:100%;display:flex;flex-direction:column;gap:16px}
  .field{display:flex;flex-direction:column;gap:6px;text-align:left}
  .field label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#9a8f87;font-weight:300}
  .field input{border:0.5px solid #ddd6cc;background:#fff;padding:12px 14px;font-family:'Jost',sans-serif;font-size:13px;font-weight:300;color:#2c2825;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
  .field input:focus{border-color:#b8956a}
  .field input::placeholder{color:#c8c0b8;font-weight:300}
  .btn-enter{margin-top:8px;padding:14px;background:#2c2825;color:#f5f0e8;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;font-weight:300;border:none;cursor:pointer;transition:background 0.2s;width:100%}
  .btn-enter:hover{background:#1a1612}
  .back-link{display:block;margin-top:28px;font-size:11px;color:#b8a898;font-weight:300;text-decoration:none;letter-spacing:0.08em;transition:color 0.2s}
  .back-link:hover{color:#2c2825}
  footer{padding:20px;font-size:10px;color:#c8c0b8;font-weight:300;letter-spacing:0.1em}
</style>
</head>
<body>

<div class="wrapper">
  <div class="logo">Wedding Clinic</div>
  <div class="subtitle">Área reservada</div>
  <div class="divider"></div>
  <form class="form" onsubmit="handleLogin(event)">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="o seu email" required autocomplete="username">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-enter">Entrar</button>
  </form>
  <a href="index.html" class="back-link">← Voltar ao site</a>
</div>

<footer>ImplementIQ Systems</footer>

<script>
  function handleLogin(e) {
    e.preventDefault();
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
